<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Usuarios Fullstack</title>
    <!-- Fuente Inter de Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <style>
        /* --- ESTILOS CSS --- */
        :root {
            --bg-main: #0a0e17;
            --bg-card: #141b2d;
            --primary: #46e3b7;
            --secondary: #8a7df0;
            --text-main: #ffffff;
            --text-muted: #8b9bb4;
            --border: #2d3748;
            --font-family: 'Inter', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: var(--font-family);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .main-header, .main-footer {
            text-align: center;
            padding: 2rem;
            color: var(--text-muted);
        }

        .main-header h1 {
            font-weight: 600;
            font-size: 1.5rem;
        }

        .main-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }

        .form-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 2.5rem;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .form-card h2 {
            font-size: 1.25rem;
            font-weight: 500;
            margin-bottom: 2rem;
            text-align: center;
        }

        .input-group {
            margin-bottom: 1.5rem;
            display: flex;
            flex-direction: column;
        }

        .input-group label {
            font-size: 0.875rem;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }

        .input-group input {
            background-color: transparent;
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-main);
            padding: 0.75rem 1rem;
            font-size: 1rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(70, 227, 183, 0.15);
        }

        .input-group input::placeholder {
            color: #4a5568;
        }

        .password-group {
            position: relative;
        }

        .password-group input {
            padding-right: 3rem;
        }

        .icon-btn {
            position: absolute;
            right: 0.75rem;
            bottom: 0.5rem;
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 1.1rem;
        }

        .primary-btn {
            background-color: var(--primary);
            border: none;
            border-radius: 8px;
            color: #0a0e17;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            padding: 1rem;
            width: 100%;
            transition: background-color 0.2s, transform 0.1s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
            margin-top: 1rem;
        }

        .primary-btn:hover {
            background-color: #38bfa0;
        }

        .primary-btn:disabled {
            background-color: #2d3748;
            color: var(--text-muted);
            cursor: not-allowed;
        }

        .spinner {
            border: 2px solid rgba(0,0,0,0.1);
            border-top: 2px solid #0a0e17;
            border-radius: 50%;
            width: 1rem;
            height: 1rem;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .hidden {
            display: none !important;
        }

        .form-footer {
            margin-top: 1.5rem;
            text-align: center;
        }

        .form-footer a {
            color: var(--secondary);
            text-decoration: none;
            font-size: 0.875rem;
        }

        /* --- NOTIFICACIONES TOAST (Reemplazo de alert) --- */
        .toast-container {
            position: fixed;
            top: 1.5rem;
            right: 1.5rem;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .toast {
            background-color: #1a233b;
            border: 1px solid #4a5568;
            border-radius: 8px;
            color: var(--text-main);
            padding: 1rem 1.5rem;
            min-width: 280px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
            animation: toast-in 0.3s ease-out forwards;
        }

        .toast-error {
            border-color: #f56565;
        }

        @keyframes toast-in {
            0% { transform: translateX(100%); opacity: 0; }
            100% { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>
<body>
    
    <header class="main-header">
        <h1>Gestor de Usuarios Fullstack</h1>
    </header>

    <main class="main-container">
        <section class="form-card">
            <h2>Crear Cuenta Nueva</h2>
            <form id="registerForm">
                <div class="input-group">
                    <label for="name">Nombre Completo</label>
                    <input type="text" id="name" name="name" placeholder="Ej: Axel Chuquihuanca" required>
                </div>

                <div class="input-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="correo@ejemplo.com" required>
                </div>

                <div class="input-group password-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                    <button type="button" id="togglePassword" class="icon-btn">👁️</button>
                </div>
                
                <button type="submit" id="submitBtn" class="primary-btn">
                    <span>Crear Cuenta</span>
                    <div class="spinner hidden"></div>
                </button>
            </form>
        </section>
    </main>

    <footer class="main-footer">
        <p>Gestor de Usuarios Fullstack</p>
    </footer>

    <!-- Contenedor de notificaciones Toast -->
    <div id="toastContainer" class="toast-container"></div>

    <!-- --- CÓDIGO JAVASCRIPT --- -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('registerForm');
            const submitBtn = document.getElementById('submitBtn');
            const spinner = submitBtn.querySelector('.spinner');
            const btnText = submitBtn.querySelector('span');
            const toastContainer = document.getElementById('toastContainer');
            const togglePassword = document.getElementById('togglePassword');
            const passwordInput = document.getElementById('password');

            // 1. Mostrar/Ocultar contraseña
            togglePassword.addEventListener('click', () => {
                const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordInput.setAttribute('type', type);
            });

            // 2. Función Notificación Toast (Sustituye al alert)
            const showToast = (message, type = 'success') => {
                const toast = document.createElement('div');
                toast.className = `toast toast-${type}`;
                const icon = type === 'success' ? '✅' : '❌';
                
                toast.innerHTML = `<span>${icon} ${message}</span>`;
                toastContainer.appendChild(toast);
                
                setTimeout(() => {
                    toast.remove();
                }, 4000);
            };

            // 3. Envío del Formulario
            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                // Animación de carga
                submitBtn.disabled = true;
                btnText.classList.add('hidden');
                spinner.classList.remove('hidden');
                
                const formData = new FormData(form);
                const data = Object.fromEntries(formData);

                try {
                    // Usamos la ruta relativa '/api/auth/register' para que funcione tanto local como en Render
                    const response = await fetch('/api/auth/register', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(data)
                    });

                    const result = await response.json();

                    // Quitar animación de carga
                    submitBtn.disabled = false;
                    btnText.classList.remove('hidden');
                    spinner.classList.add('hidden');

                    if (response.ok) {
                        showToast(`¡Cuenta creada con éxito para ${data.name}!`, 'success');
                        form.reset();
                    } else {
                        showToast(result.message || 'Error al crear la cuenta', 'error');
                    }

                } catch (error) {
                    submitBtn.disabled = false;
                    btnText.classList.remove('hidden');
                    spinner.classList.add('hidden');
                    showToast('Error de conexión con el servidor', 'error');
                    console.error('Error:', error);
                }
            });
        });
    </script>
</body>
</html>
